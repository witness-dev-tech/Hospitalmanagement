<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Sharp gradients tuned for high visibility at micro scales -->
    <linearGradient id="favTeal" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00695c" />
      <stop offset="100%" stop-color="#009688" />
    </linearGradient>
    <linearGradient id="favBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2196f3" />
      <stop offset="100%" stop-color="#1565c0" />
    </linearGradient>
  </defs>

  <!-- Clean rounded background boundary for light/dark mode tab visibility -->
  <rect width="100%" height="100%" fill="#ffffff" rx="44" />

  <!-- Core SmartCare Shield Archetype Structure -->
  <g transform="translate(100, 100) scale(0.9)">
    <!-- Left Blue Shield Blade -->
    <path d="M -65,-25 C -65,-60 -35,-75 0,-80 L 0,-45 C -20,-42 -35,-32 -35,-10 C -35,20 -15,38 0,45 L 0,80 C -40,70 -65,35 -65,-25 Z" fill="url(#favBlue)" />
    
    <!-- Right Teal Shield Blade -->
    <path d="M 65,-25 C 65,-60 35,-75 0,-80 L 0,-45 C 20,-42 35,-32 35,-10 C 35,20 15,38 0,45 L 0,80 C 40,70 65,35 65,-25 Z" fill="url(#favTeal)" />
    
    <!-- High-Contrast Core ECG Pulse Wave -->
    <path d="M -45,0 L -20,0 L -12,-28 L -2,35 L 8,-18 L 15,12 L 22,-5 L 45,-5" fill="none" stroke="#0f172a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
